<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>單字卡複習 - 背單字</title>
<link rel="stylesheet" href="css/style.css">
<script>
  (function () {
    var saved = localStorage.getItem("vocab-theme");
    if (saved) document.documentElement.setAttribute("data-theme", saved);
  })();
</script>
</head>
<body>
<div id="topbar-root"></div>
<main class="container">

<section class="card" id="setup-card">
  <h2>🔁 單字卡複習</h2>
  <p class="hint">系統會優先挑選今天到期複習、或還不熟的單字。點卡片翻面查看意思，再選擇「還不熟」或「我記得」。</p>
  <div class="field-row">
    <label>範圍</label>
    <select id="f-tag"><option value="">全部單字</option></select>
  </div>
  <div class="field-row">
    <label><input type="checkbox" id="f-due-only" checked> 只複習今天到期的單字（沒有的話會用全部單字）</label>
  </div>
  <div class="field-row">
    <label>張數上限</label>
    <input type="number" id="f-count" value="20" min="1" max="100">
  </div>
  <div id="f-error" class="status error hidden"></div>
  <button class="btn primary" id="btn-start-flashcards">開始複習</button>
</section>

<section class="card hidden" id="play-card">
  <div id="f-progress" class="hint"></div>
  <div class="flashcard-stage">
    <div class="flashcard" id="flashcard">
      <div class="flashcard-face flashcard-front">
        <span class="flashcard-word" id="f-front-word"></span>
        <button class="btn small speaker" id="f-speak-front" title="播放發音">🔊</button>
        <div class="flashcard-hint">點卡片查看意思</div>
      </div>
      <div class="flashcard-face flashcard-back">
        <span class="flashcard-word" id="f-back-word"></span>
        <button class="btn small speaker" id="f-speak-back" title="播放發音">🔊</button>
      </div>
    </div>
  </div>
  <div class="flashcard-actions hidden" id="f-actions">
    <button class="btn danger big" id="f-dont-know">😵 還不熟</button>
    <button class="btn primary big" id="f-know">✅ 我記得</button>
  </div>
</section>

<section class="card hidden" id="done-card">
  <h2>複習完成！</h2>
  <p id="f-summary"></p>
  <button class="btn primary" id="btn-restart">再複習一輪</button>
  <a class="btn" href="index.html">回總覽</a>
</section>

</main>
<script src="js/store.js"></script>
<script src="js/speak.js"></script>
<script src="js/flashcards.js"></script>
<script src="js/nav.js"></script>
</body>
</html>
